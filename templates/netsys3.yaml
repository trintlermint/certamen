    choices:
      - Recovering secret key from ciphertext
      - Finding two different messages with same hash
      - Reversing any hash instantly
      - Breaking all digital signatures directly
    answer: 1
    language: text

  - question: Why did weak collision resistance (e.g., SHA-1) become problematic for certificates?
