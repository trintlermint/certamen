      - It enabled practical downgrade to plaintext only
      - It weakened trust in certificate signatures
      - It removed need for CAs
    answer: 2
    language: text

  - question: A MAC with shared key K between Alice and Bob proves message came from...
    explain: Either key holder could have generated it.
