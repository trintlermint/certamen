name: Network Systems Practice Exam for part 3
author: trintlermint
questions:
  - question: In TCP, what is the primary role of congestion control?
    explain: Congestion control protects the network from overload by adapting sender rate.
    choices:
      - Prevent overloading the network
      - Prevent overloading the receiver application buffer
      - Encrypt packets end-to-end
      - Guarantee zero packet loss
    answer: 0
    language: text

  - question: In TCP, what is the primary role of flow control?
    explain: Flow control prevents sender from overwhelming receiver-side buffering/processing.
    choices:
      - Prevent overloading the network core
      - Prevent overloading the receiver
      - Detect bit errors on links
      - Replace congestion control
    answer: 1
    language: text

  - question: Which RTT component typically increases first when congestion starts building?
    explain: Queueing delay grows as buffers fill.
    choices:
      - Propagation delay
      - Transmission delay due to slower links
      - Queueing delay
      - Cryptographic processing delay
    answer: 2
    language: text

  - question: In classic TCP AIMD, after a timeout event, congestion window behavior is best described as...
    explain: Timeout indicates severe congestion, cwnd reset near 1 MSS and slow start resumes.
    choices:
      - Keep cwnd unchanged
      - Halve cwnd and continue additive increase immediately
      - Reset cwnd to initial value and enter slow start
      - Double cwnd to recover quickly
    answer: 2
    language: text

  - question: In classic TCP New Reno, triple duplicate ACK usually triggers...
    explain: Triple dup ACK suggests isolated loss; cwnd is reduced multiplicatively and fast recovery used.
    choices:
      - Immediate connection teardown
      - Multiplicative decrease with fast recovery
      - Slow start from scratch always
      - Disabling retransmissions
    answer: 1
    language: text

  - question: During additive increase in TCP AIMD, cwnd grows approximately by...
    explain: Standard AIMD increases cwnd by about 1 MSS per RTT.
    choices:
      - 1 MSS per RTT
      - 2 MSS per ACK
      - 1 MSS per packet loss
      - Exponential doubling each RTT
    answer: 0
    language: text

  - question: Why can fixed cwnd values (same for all flows) be unfair?
    explain: Different RTTs produce different throughputs even with same cwnd.
    choices:
      - Because encryption changes packet sizes
      - Because RTT differences cause throughput differences
      - Because DNS caching interferes
      - Because UDP is prioritized by routers
    answer: 1
    language: text

  - question: TCP CUBIC primarily increases cwnd as a function of...
    explain: CUBIC is time-based growth around prior Wmax.
    choices:
      - ACK count only
      - Packet size only
      - Time since last loss event
      - Receiver buffer occupancy only
    answer: 2
    language: text

  - question: A key fairness benefit of CUBIC compared with purely ACK-clocked growth is...
    explain: Time-based growth reduces RTT bias.
    choices:
      - Eliminates need for retransmissions
      - Reduces dependence on RTT for growth speed
      - Forces identical cwnd for all flows
      - Makes loss impossible
    answer: 1
    language: text

  - question: ECN allows routers to signal congestion by...
    explain: Marking packets instead of dropping can signal congestion early.
    choices:
      - Corrupting payload bytes
      - Resetting TCP sequence numbers
      - Marking ECN bits in IP header
      - Sending DNS TXT records
    answer: 2
    language: text

  - question: If a sender ignores ECN Congestion Experienced marks while others respond correctly, likely effect is...
    explain: Non-responsive flow may grab more than fair share.
    choices:
      - It will get less bandwidth than fair share
      - It may get more than fair share
      - It will be forced to use UDP
      - No impact in any case
    answer: 1
    language: text

  - question: In token bucket (rate r, bucket B), B primarily limits...
    explain: Bucket size determines maximum burst tolerance.
    choices:
      - Long-term average rate
      - Maximum packet size
      - Maximum burst size
      - Number of flows
    answer: 2
    language: text

  - question: In token bucket, rate r primarily constrains...
    explain: Token generation rate sets sustained sending rate.
    choices:
      - Long-term average send rate
      - Initial burst only
      - Packet TTL
      - Queue discipline type
    answer: 0
    language: text

  - question: A token bucket-policed flow sending less than allowed in one interval is...
    explain: Token bucket is an upper bound, not minimum reservation usage requirement.
    choices:
      - Always non-compliant
      - Compliant; sending less is allowed
      - Forced to compensate immediately next millisecond
      - Dropped by default
    answer: 1
    language: text

  - question: Two token-bucket flows (B1,r1) and (B2,r2) merged can be upper-bounded by...
    explain: Safe aggregate envelope commonly uses B1+B2 and r1+r2.
    choices:
      - (max(B1,B2), max(r1,r2))
      - (B1+B2, r1+r2)
      - (B1*B2, r1*r2)
      - Not representable by any token bucket
    answer: 1
    language: text

  - question: Fair Queueing (FQ) aims to approximate...
    explain: Bit-by-bit round robin fairness across active flows/classes.
    choices:
      - First-come-first-serve
      - Strict priority for smallest packets
      - Generalized processor sharing fairness
      - Random early dropping only
    answer: 2
    language: text

  - question: With FQ and two backlogged classes, unused share from one class is typically...
    explain: Work-conserving schedulers redistribute unused capacity.
    choices:
      - Left idle permanently
      - Given to active classes
      - Converted to retransmission overhead
      - Reserved for ICMP
    answer: 1
    language: text

  - question: Priority queueing compared to FQ most risks...
    explain: Low-priority starvation can occur with sustained high-priority traffic.
    choices:
      - Starvation of low-priority traffic
      - Equal share always
      - Encryption failure
      - Eliminating jitter completely
    answer: 0
    language: text

  - question: Expedited Forwarding (DiffServ EF) is intended to emulate...
    explain: EF strives for low loss/low delay behavior akin lightly loaded service.
    choices:
      - Bulk-transfer-only best effort
      - Lightly loaded virtual leased line behavior
      - Guaranteed confidentiality
      - IP multicast setup
    answer: 1
    language: text

  - question: Why best-effort Internet often still supports decent real-time calls?
    explain: In many paths, typical utilization leaves short queues most of the time.
    choices:
      - Propagation delay is zero
      - Routers retransmit all lost packets instantly
      - Queues are often short in practice
      - UDP reserves bandwidth globally
    answer: 2
    language: text

  - question: Which delay component contributes most to jitter variation?
    explain: Queueing delay fluctuates with load.
    choices:
      - Propagation delay
      - Queueing delay
      - Header parsing delay
      - CRC generation delay
    answer: 1
    language: text

  - question: Security goal violated by replaying an old valid order is...
    explain: Replay attacks violate freshness.
    choices:
      - Confidentiality
      - Freshness
      - Availability
      - Accountability
    answer: 1
    language: text

  - question: Attack where adversary pretends to be another user is...
