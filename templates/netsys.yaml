name: Networking Practice Exam
author: trintlermint
questions:
  - question: |
      Consider a link with a bandwidth of 1 Mbps, spanning a distance of 1200 km, with signals propagating at 200,000 km/s, and packets of 1000 bits.

      What is the propagation time of one packet (in milliseconds)?
    explain: |
      Propagation time = distance / propagation speed = 1200 km / 200,000 km/s = 0.006 s = 6 ms.
      Propagation time depends only on distance and signal speed, not on packet size or bandwidth.
    choices:
      - "1 ms"
      - "5 ms"
      - "6 ms"
      - "12 ms"
      - "0.6 ms"
    answer: 2

  - question: |
      Consider a link with a bandwidth of 1 Mbps, spanning a distance of 1200 km, with signals propagating at 200,000 km/s, and packets of 1000 bits.

      What is the transmission time of one packet (in milliseconds)?
    explain: |
      Transmission time = packet size / bandwidth = 1000 bits / 1,000,000 bps = 0.001 s = 1 ms.
      Transmission time depends on the packet size and the link bandwidth.
    choices:
      - "0.1 ms"
      - "0.5 ms"
      - "1 ms"
      - "6 ms"
      - "10 ms"
    answer: 2

  - question: |
      Consider a link with a bandwidth of 1 Mbps, spanning a distance of 1200 km, with signals propagating at 200,000 km/s, and packets of 1000 bits.

      A sliding window protocol is used. What is the minimum Sending Window Size (SWS) that will suffice to fully utilise the link?
    explain: |
      To fully utilise the link, the sender must be able to keep transmitting during the entire round-trip time plus one transmission time.
      RTT = 2 × propagation time = 2 × 6 ms = 12 ms.
      The sender can transmit during RTT + t_trans = 12 + 1 = 13 ms.
      Number of packets that fit = (RTT + t_trans) / t_trans = 13 / 1 = 13.
      Therefore SWS = 13.
    choices:
      - "6"
      - "7"
      - "12"
      - "13"
      - "14"
    answer: 3

  - question: |
      Consider a link with a bandwidth of 1 Mbps, spanning a distance of 1200 km, with signals propagating at 200,000 km/s, and packets of 1000 bits.

      A sliding window protocol is used with SWS = 13 and RWS = 1, and packets cannot overtake each other. How many bits should the sequence number have, at minimum?
    explain: |
      With RWS = 1, the number of distinct sequence numbers needed is SWS + RWS = 13 + 1 = 14.
      The number of bits required is ⌈log₂(14)⌉ = ⌈3.807⌉ = 4 bits.
      4 bits can represent 16 distinct values (0–15), which is ≥ 14.
    choices:
      - "3 bits"
      - "4 bits"
      - "5 bits"
      - "13 bits"
      - "14 bits"
    answer: 1

  - question: |
      In a sliding window protocol, why would one want to choose RWS > 1?
    explain: |
      With RWS = 1, if a single packet is lost but subsequent packets arrive, the receiver must discard all subsequent packets because it can only accept the next expected one. The sender must then retransmit the entire window. With RWS > 1, the receiver can buffer out-of-order packets, so only the lost packet needs to be retransmitted. This reduces the number of retransmissions when a single packet is lost.
    choices:
      - "To prevent packets from overtaking each other."
      - "To prevent problems if packets overtake each other."
      - "To deal with variations in the bandwidth×delay product."
      - "In order to reduce the number of retransmissions if a single packet is lost."
      - "In order to reduce the number of retransmissions if an entire window of packets is lost."
    answer: 3

  - question: |
      Consider a sliding window protocol where a time-sequence diagram shows a sender transmitting with single-bit sequence numbers (0 and 1). Due to a timeout, the sender retransmits an old packet (sequence number 0). The receiver, having already moved on, receives this retransmitted packet.

      With SWS = 2 and single-bit (1-bit) sequence numbers, what will the receiver do with the retransmitted packet it receives?
    explain: |
      With SWS = 2 and only 2 sequence numbers (0 and 1), the receiver cannot distinguish between a retransmission of an old packet and a new packet with the same sequence number. It will deliver the duplicate/old packet to the higher layer, which is bad because it causes duplicate or out-of-order delivery, violating reliable data transfer guarantees.
    choices:
      - "Deliver it to the higher layer, which is good."
      - "Deliver it to the higher layer, which is bad."
      - "Discard it, which is good."
      - "Discard it, which is bad."
    answer: 1

  - question: |
      In a sliding window protocol with SWS = 2 and single-bit sequence numbers (0 and 1), the receiver receives a retransmitted packet after a timeout. Will the receiver send an acknowledgment in response to this packet?
    explain: |
      The receiver always sends an acknowledgment for a packet it accepts. Since it believes this is a valid new packet (it cannot distinguish retransmissions with only single-bit sequence numbers and SWS = 2), it will send an ack. The ack number corresponds to the next expected sequence number: ack 1.
    choices:
      - "No."
      - "Yes, ack 0."
      - "Yes, ack 1."
      - "Only if the previous ack 1 was lost."
    answer: 2

  - question: |
      A speech contains only five words with the following frequencies:

      | Word    | Frequency |
      |---------|-----------|
      | great   | 30%       |
      | race    | 30%       |
      | peace   | 19%       |
      | tired   | 19%       |
      | victory | 2%        |

      Down to how few bits (on average) per word can the speech be compressed?
    explain: |
      The minimum average bits per word is given by the Shannon entropy:
      H = −Σ p(x) × log₂(p(x))
      H = −(0.30 × log₂(0.30) + 0.30 × log₂(0.30) + 0.19 × log₂(0.19) + 0.19 × log₂(0.19) + 0.02 × log₂(0.02))
      H = −(0.30×(−1.737) + 0.30×(−1.737) + 0.19×(−2.396) + 0.19×(−2.396) + 0.02×(−5.644))
      H = 0.5211 + 0.5211 + 0.4552 + 0.4552 + 0.1129
      H ≈ 2.07 bits per word.
    choices:
      - "1.50 bits"
      - "2.00 bits"
      - "2.07 bits"
      - "2.25 bits"
      - "2.32 bits"
    answer: 2

  - question: |
      A source emits five words with known probabilities (great: 30%, race: 30%, peace: 19%, tired: 19%, victory: 2%). Suppose the order of the words is not completely random: either the speaker never immediately repeats a word, or the speaker always says every word twice in a row.

      Compared to the completely random (i.i.d.) case, is the resulting Shannon entropy per word higher or lower?
    explain: |
      In both cases, the source has additional structure (dependencies between consecutive words) compared to the fully random case. Any structure or predictability reduces entropy. If words are never repeated consecutively, knowing the current word eliminates one possibility for the next word, reducing uncertainty. If words are always doubled, after seeing a word you know the next word with certainty (every other word has zero entropy). In both cases, the conditional entropy is lower than the i.i.d. entropy.
    choices:
      - "Higher in both cases."
      - "Lower in both cases."
      - "Higher in case of no repetition, lower in case of doubling."
      - "Lower in case of no repetition, higher in case of doubling."
    answer: 1

  - question: |
      Given five words with probabilities (great: 30%, race: 30%, peace: 19%, tired: 19%, victory: 2%), consider the following encoding:

      | Word    | Prob | Code A | Code B | Code C | Code D | Code E |
      |---------|------|--------|--------|--------|--------|--------|
      | great   | 30%  | 0      | 000    | 00     | 000    | 11     |
      | race    | 30%  | 1      | 01     | 01     | 001    | 10     |
      | peace   | 19%  | 00     | 10     | 10     | 010    | 01     |
      | tired   | 19%  | 01     | 11     | 110    | 011    | 001    |
      | victory | 2%   | 110    | 001    | 111    | 1      | 0000   |

      Which codes are suitable for encoding the words into fewer than 2.25 bits per word on average? A suitable code must be uniquely decodable AND have an average code length below 2.25 bits.
    explain: |
      Code A: Not uniquely decodable. "0" is a prefix of "00" and "01"; "1" is a prefix of "110". The code is not prefix-free and cannot be uniquely decoded. NOT suitable.

      Code B: Prefix-free (no codeword is a prefix of another). Average = 0.30×3 + 0.30×2 + 0.19×2 + 0.19×2 + 0.02×3 = 0.9 + 0.6 + 0.38 + 0.38 + 0.06 = 2.32 bits. Exceeds 2.25. NOT suitable.

      Code C: Prefix-free. Average = 0.30×2 + 0.30×2 + 0.19×2 + 0.19×3 + 0.02×3 = 0.6 + 0.6 + 0.38 + 0.57 + 0.06 = 2.21 bits. Below 2.25. SUITABLE.

      Code D: Prefix-free. Average = 0.30×3 + 0.30×3 + 0.19×3 + 0.19×3 + 0.02×1 = 0.9 + 0.9 + 0.57 + 0.57 + 0.02 = 2.96 bits. Exceeds 2.25. NOT suitable.

      Code E: Prefix-free. Average = 0.30×2 + 0.30×2 + 0.19×2 + 0.19×3 + 0.02×4 = 0.6 + 0.6 + 0.38 + 0.57 + 0.08 = 2.23 bits. Below 2.25. SUITABLE.
    choices:
      - "Only Code A"
      - "Only Code B"
      - "Only Code C"
      - "Codes C and E"
      - "Codes B, C, and E"
    answer: 3

  - question: |
      An athlete's speech contains errors (mistakes in what the athlete said). Can such errors be corrected by using an error correcting code when transmitting the speech over a channel?
    explain: |
      Error correcting codes are designed to correct errors introduced by the communication channel during transmission. They cannot correct errors that were already present in the source data before transmission. The athlete's speech errors exist at the source level, before any encoding or transmission takes place. An error correcting code faithfully preserves whatever data it receives (including the mistakes), correcting only channel-induced errors.
    choices:
      - "Yes, but only if a Turbo code is used."
      - "Yes, an error correcting code will certainly correct the error."
      - "Yes, but the error is only corrected with probability arbitrarily close to 1, not certainty."
      - "No, an error correcting code cannot correct errors that were already present at the source."
    answer: 3

  - question: |
      Consider a binary symmetric channel with a raw speed of 100 bits/s and an error probability of 5%. What is this channel's Shannon capacity (in bits/s)?
    explain: |
      The capacity of a binary symmetric channel is:
      C = 1 − H(p), where H(p) = −p×log₂(p) − (1−p)×log₂(1−p)

      H(0.05) = −0.05×log₂(0.05) − 0.95×log₂(0.95)
              = −0.05×(−4.3219) − 0.95×(−0.0740)
              = 0.2161 + 0.0703 = 0.2864

      C = 1 − 0.2864 = 0.7136 bits per channel use

      Shannon capacity = 100 × 0.7136 ≈ 71.36 bits/s
    choices:
      - "5 bits/s"
      - "28.64 bits/s"
      - "50 bits/s"
      - "71.36 bits/s"
      - "95 bits/s"
    answer: 3

  - question: |
      A binary symmetric channel has a raw speed of 100 bits/s and an error probability of 5%, giving a Shannon capacity of approximately 71.36 bits/s. Suppose we want to send 70 bits/s over this channel and can tolerate 0.01% bit errors. Which statement is correct?
    explain: |
      According to Shannon's channel coding theorem, if the desired rate (70 bits/s) is below the channel capacity (71.36 bits/s), then there exists an error correcting code that can achieve arbitrarily low error probability. However, not just any code will work — the code must be suitably chosen (with sufficient block length and proper design). Since 70 < 71.36, it is achievable with the right code.
    choices:
      - "This can be done even without using an error correcting code."
      - "This needs an error correcting code, but it doesn't matter which code is chosen."
      - "Only a suitably chosen error correcting code can do this."
      - "This is not possible, no matter what error correcting code is used."
    answer: 2

  - question: |
      A web client downloads an HTML file of 1000 bytes, then (after parsing) downloads an image of 10,000 bytes and a movie of 10,000,000 bytes. The link speed is 1000 kbit/s and the RTT is 2 ms. Assume protocol windows are large enough and parsing time is zero.

      How long does it take to transfer the complete page using HTTP 1.1 with persistent connections and pipelining (in milliseconds)?
    explain: |
      Transmission times:
      - HTML: 1000 × 8 / 1,000,000 = 8 ms
      - Image: 10,000 × 8 / 1,000,000 = 80 ms
      - Movie: 10,000,000 × 8 / 1,000,000 = 80,000 ms

      With HTTP 1.1 persistent + pipelining:
      1. TCP handshake: 1 RTT = 2 ms
      2. Request HTML + receive response: 1 RTT + 8 ms = 2 + 8 = 10 ms
      3. Request image and movie (pipelined) + receive both: 1 RTT + 80 + 80,000 = 2 + 80,080 = 80,082 ms

      Total = 2 + 10 + 80,082 = 80,094 ms
    choices:
      - "80,080 ms"
      - "80,088 ms"
      - "80,090 ms"
      - "80,094 ms"
      - "80,100 ms"
    answer: 3

  - question: |
      A web client downloads an HTML file of 1000 bytes, an image of 10,000 bytes, and a movie of 10,000,000 bytes. The link speed is 1000 kbit/s and the RTT is 2 ms.

      How much longer would the transfer take using HTTP 1.0 (without persistent connections or pipelining) compared to HTTP 1.1 with persistent connections and pipelining?
    explain: |
      HTTP 1.0 requires a new TCP connection for each object:
      - HTML: 1 RTT (handshake) + 1 RTT (request) + 8 ms = 12 ms
      - Image: 1 RTT + 1 RTT + 80 ms = 84 ms
      - Movie: 1 RTT + 1 RTT + 80,000 ms = 80,004 ms
      Total = 80,100 ms

      HTTP 1.1 persistent + pipelining: 80,094 ms

      Difference = 80,100 − 80,094 = 6 ms = 3 RTTs.

      The savings come from: 2 fewer TCP handshakes (2 RTTs saved) + 1 fewer separate request-response round trip due to pipelining (1 RTT saved) = 3 RTTs.
    choices:
      - "Equally long."
      - "1 RTT longer."
      - "2 RTTs longer."
      - "3 RTTs longer."
      - "Approximately twice as long."
      - "Approximately three times as long."
    answer: 3

  - question: |
      We want to distribute a movie of 10,000,000 bytes (10⁷ bytes) using a peer-to-peer network. The initial server has an upload speed of 1050 kbit/s. There are 10 peers, each with 1000 kbit/s download and 1000 kbit/s upload speed.

      What best describes the bottleneck in this situation?
    explain: |
      File size = 10⁷ bytes = 8 × 10⁷ bits.
      The minimum distribution time is the maximum of:
      1. File / server upload = 8×10⁷ / 1,050,000 ≈ 76.2 s
      2. File / min peer download = 8×10⁷ / 1,000,000 = 80 s
      3. N × File / (server upload + N × peer upload) = 10 × 8×10⁷ / (1,050,000 + 10 × 1,000,000) ≈ 72.4 s

      The maximum is 80 s, corresponding to the download speed of the peers. Each peer must download the entire file, and the slowest individual download speed limits the distribution time.
    choices:
      - "The number of peers."
      - "The download speed of the peers."
      - "The upload speed of the peers."
      - "The upload speed of the server."
    answer: 1

  - question: |
      Consider the IMAP protocol for e-mail. The first step in IMAP is an authentication step. Does this mean that if we make the use of IMAP obligatory, it is no longer possible to send messages with fake sender addresses?
    explain: |
      IMAP (Internet Message Access Protocol) is used for retrieving and managing email from a mail server, not for sending email. Email is sent using SMTP (Simple Mail Transfer Protocol). Making IMAP authentication obligatory has no effect on the sending process, so it cannot prevent fake sender addresses. SMTP is a separate protocol with its own (often weaker) authentication mechanisms.
    choices:
      - "Yes, since the sender's MTA could check that the sender address matches the IMAP authentication."
      - "Yes, since the receiver's MTA could check that the sender address matches the IMAP authentication."
      - "No, since sending mails is not done using IMAP but using SMTP."
      - "No, since this authentication step happens after the message has been delivered to the receiver's MTA."
    answer: 2

  - question: |
      A link has a bandwidth of 10 Mbps, spans 500 km, and signals propagate at 250,000 km/s. What is the propagation delay?
    explain: |
      Propagation delay = distance / speed = 500 / 250,000 = 0.002 s = 2 ms.
    choices:
      - "0.2 ms"
      - "1 ms"
      - "2 ms"
      - "5 ms"
      - "20 ms"
    answer: 2

  - question: |
      A link has a bandwidth of 10 Mbps. Packets are 5000 bits. What is the transmission time of one packet?
    explain: |
      Transmission time = packet size / bandwidth = 5000 / 10,000,000 = 0.0005 s = 0.5 ms.
    choices:
      - "0.05 ms"
      - "0.5 ms"
      - "2 ms"
      - "5 ms"
      - "50 ms"
    answer: 1

  - question: |
      A link has a bandwidth of 2 Mbps, spans 3000 km, and signals propagate at 200,000 km/s. Packets are 2000 bits. What is the round-trip time (RTT), considering only propagation delay?
    explain: |
      Propagation delay = 3000 / 200,000 = 15 ms.
      RTT = 2 × propagation delay = 2 × 15 = 30 ms.
    choices:
      - "7.5 ms"
      - "15 ms"
      - "30 ms"
      - "31 ms"
      - "60 ms"
    answer: 2

  - question: |
      A satellite link spans 36,000 km with a signal propagation speed of 300,000 km/s and a bandwidth of 10 Mbps. What is the one-way propagation delay?
    explain: |
      Propagation delay = 36,000 / 300,000 = 0.12 s = 120 ms.
    choices:
      - "12 ms"
      - "36 ms"
      - "100 ms"
      - "120 ms"
      - "240 ms"
    answer: 3

  - question: |
      What is the bandwidth-delay product for a link with bandwidth 5 Mbps and RTT 40 ms?
    explain: |
      Bandwidth-delay product = bandwidth × RTT = 5,000,000 × 0.040 = 200,000 bits = 200 kbits.
      This represents the maximum amount of data "in flight" on the link.
    choices:
      - "20,000 bits"
      - "50,000 bits"
      - "100,000 bits"
      - "200,000 bits"
      - "500,000 bits"
    answer: 3

  - question: |
      A 100 Mbps Ethernet link is 200 meters long. Signals propagate at 200,000 km/s. What is the ratio of propagation delay to the transmission time of a 1500-byte packet?
    explain: |
      Propagation delay = 0.2 km / 200,000 km/s = 0.000001 s = 1 μs.
      Transmission time = (1500 × 8) / 100,000,000 = 12,000 / 100,000,000 = 0.00012 s = 120 μs.
      Ratio = 1 / 120 ≈ 0.0083.
    choices:
      - "0.0083"
      - "0.083"
      - "0.83"
      - "8.3"
      - "83"
    answer: 0

  - question: |
      If a link has a bandwidth of 100 kbps and a propagation delay of 50 ms, how many bits are "on the wire" (in transit) at any one time when the sender transmits continuously?
    explain: |
      Bits on the wire = bandwidth × propagation delay = 100,000 × 0.050 = 5000 bits.
      This is the one-way bandwidth-delay product.
    choices:
      - "500 bits"
      - "1000 bits"
      - "5000 bits"
      - "10,000 bits"
      - "50,000 bits"
    answer: 2

  - question: |
      A 1 Gbps link spans 5000 km with a propagation speed of 200,000 km/s. How long does it take to transmit a single 64-byte packet and have its last bit arrive at the receiver?
    explain: |
      Transmission time = (64 × 8) / 1,000,000,000 = 512 / 1,000,000,000 = 0.000000512 s ≈ 0.000512 ms.
      Propagation delay = 5000 / 200,000 = 25 ms.
      Total = 25.000512 ms ≈ 25 ms (propagation dominates).
    choices:
      - "0.000512 ms"
      - "0.512 ms"
      - "25 ms"
      - "25.000512 ms"
      - "50 ms"
    answer: 3

  - question: |
      A stop-and-wait protocol is used on a 1 Mbps link with an RTT of 20 ms and packet size 1000 bits. What is the link utilisation?
    explain: |
      Transmission time = 1000 / 1,000,000 = 1 ms.
      Total cycle time = transmission time + RTT = 1 + 20 = 21 ms.
      Utilisation = transmission time / cycle time = 1 / 21 ≈ 4.76%.
    choices:
      - "1%"
      - "4.76%"
      - "5%"
      - "10%"
      - "50%"
    answer: 1

  - question: |
      For a stop-and-wait protocol, the utilisation is given by U = t_trans / (t_trans + RTT). If the RTT is 100 ms and we want at least 50% utilisation, what is the minimum transmission time needed?
    explain: |
      U = t_trans / (t_trans + RTT) ≥ 0.50.
      0.50 × (t_trans + 100) ≤ t_trans
      50 + 0.50 × t_trans ≤ t_trans
      50 ≤ 0.50 × t_trans
      t_trans ≥ 100 ms.
    choices:
      - "25 ms"
      - "50 ms"
      - "100 ms"
      - "200 ms"
      - "500 ms"
    answer: 2

  - question: |
      Doubling the bandwidth of a link while keeping distance and propagation speed constant will have what effect on propagation delay?
    explain: |
      Propagation delay = distance / propagation speed. It does not depend on bandwidth at all. Doubling bandwidth has no effect on propagation delay.
    choices:
      - "Halve it."
      - "Double it."
      - "No effect."
      - "Reduce it by 25%."
      - "It depends on the packet size."
    answer: 2

  - question: |
      A link carries data at 50 Mbps. How long does it take to transmit a 1 MB (megabyte) file?
    explain: |
      1 MB = 1,000,000 bytes = 8,000,000 bits (using decimal MB).
      Transmission time = 8,000,000 / 50,000,000 = 0.16 s = 160 ms.
    choices:
      - "16 ms"
      - "20 ms"
      - "80 ms"
      - "160 ms"
      - "200 ms"
    answer: 3

  - question: |
      Two hosts are separated by two links. Link 1: bandwidth 10 Mbps, propagation delay 5 ms. Link 2: bandwidth 1 Mbps, propagation delay 2 ms. A router between them introduces no queuing delay but has a store-and-forward delay. For a single 10,000-bit packet, what is the total end-to-end delay?
    explain: |
      Link 1: transmission = 10,000 / 10,000,000 = 1 ms, propagation = 5 ms. Total on link 1 = 6 ms.
      Store-and-forward: the router must receive the entire packet before forwarding.
      Link 2: transmission = 10,000 / 1,000,000 = 10 ms, propagation = 2 ms. Total on link 2 = 12 ms.
      End-to-end = 6 + 12 = 18 ms.
    choices:
      - "8 ms"
      - "12 ms"
      - "17 ms"
      - "18 ms"
      - "23 ms"
    answer: 3

  - question: |
      Which quantity does NOT depend on the link bandwidth?
    explain: |
      Propagation delay depends only on distance and signal propagation speed. Transmission time, throughput, and bandwidth-delay product all depend on bandwidth.
    choices:
      - "Transmission time"
      - "Propagation delay"
      - "Throughput"
      - "Bandwidth-delay product"
      - "Time to transmit a file"
    answer: 1

  - question: |
      If propagation speed is 200,000 km/s, how far can a signal travel in 1 ms?
    explain: |
      Distance = speed × time = 200,000 km/s × 0.001 s = 200 km.
    choices:
      - "20 km"
      - "100 km"
      - "200 km"
      - "2000 km"
      - "200,000 km"
    answer: 2

  - question: |
      A link has bandwidth 2 Mbps, propagation delay 10 ms, and packet size 2000 bits. What is the minimum SWS to fully utilise the link?
    explain: |
      RTT = 2 × 10 = 20 ms. Transmission time = 2000 / 2,000,000 = 1 ms.
      Packets in flight = (RTT + t_trans) / t_trans = (20 + 1) / 1 = 21.
      SWS = 21.
    choices:
      - "10"
      - "11"
      - "20"
      - "21"
      - "22"
    answer: 3

  - question: |
      A link has bandwidth 4 Mbps, propagation delay 5 ms, and packet size 1000 bits. What is the minimum SWS to fully utilise the link?
    explain: |
      RTT = 2 × 5 = 10 ms. Transmission time = 1000 / 4,000,000 = 0.25 ms.
      SWS = (RTT + t_trans) / t_trans = (10 + 0.25) / 0.25 = 41.
    choices:
      - "20"
      - "40"
      - "41"
      - "42"
      - "80"
    answer: 2

  - question: |
      With SWS = 7 and RWS = 1, and packets cannot overtake each other, what is the minimum number of distinct sequence numbers needed?
    explain: |
      With RWS = 1, the minimum number of distinct sequence numbers = SWS + RWS = 7 + 1 = 8.
    choices:
      - "4"
      - "7"
      - "8"
      - "14"
      - "15"
    answer: 2

  - question: |
      With SWS = 7 and RWS = 1, how many bits are needed for the sequence number field?
    explain: |
      Need ≥ SWS + RWS = 8 distinct values. ⌈log₂(8)⌉ = 3 bits.
    choices:
      - "2 bits"
      - "3 bits"
      - "4 bits"
      - "7 bits"
      - "8 bits"
    answer: 1

  - question: |
      With SWS = 10 and RWS = 10, and packets can overtake each other, what is the minimum number of distinct sequence numbers needed?
    explain: |
      When packets can arrive out of order and RWS > 1, the requirement is:
      Number of distinct sequence numbers ≥ SWS + RWS = 10 + 10 = 20.
    choices:
      - "10"
      - "11"
      - "15"
      - "20"
      - "21"
    answer: 3

  - question: |
      In Go-Back-N (GBN), the RWS is always what value?
    explain: |
      Go-Back-N uses RWS = 1. The receiver only accepts the next expected packet in sequence. Any out-of-order packets are discarded.
    choices:
      - "0"
      - "1"
      - "Equal to SWS"
      - "Equal to SWS − 1"
      - "It varies dynamically"
    answer: 1

  - question: |
      In Selective Repeat (SR), what happens when the receiver gets an out-of-order packet that falls within its receive window?
    explain: |
      In Selective Repeat, the receiver buffers out-of-order packets that fall within its window and acknowledges them individually. It delivers packets to the higher layer only when all preceding packets have been received.
    choices:
      - "It is discarded and no ACK is sent."
      - "It is discarded and a duplicate ACK for the last in-order packet is sent."
      - "It is buffered and an ACK for that specific packet is sent."
      - "It is delivered immediately to the higher layer."
      - "The receiver resets its window to start from this packet."
    answer: 2

  - question: |
      What is the primary disadvantage of Go-Back-N compared to Selective Repeat?
    explain: |
      In Go-Back-N, when a packet is lost, the sender must retransmit that packet and all subsequent packets in the window, even if they were received correctly. This wastes bandwidth. Selective Repeat only retransmits the specific lost packet.
    choices:
      - "Go-Back-N requires more sequence number bits."
      - "Go-Back-N has higher propagation delay."
      - "Go-Back-N retransmits packets that may have been received correctly."
      - "Go-Back-N cannot detect packet loss."
      - "Go-Back-N does not use acknowledgments."
    answer: 2

  - question: |
      In a sliding window protocol, the sender has sent packets with sequence numbers 5, 6, 7, 8, 9 and has received ACKs for 5 and 6 (cumulative ACK up to 6). SWS = 5. Which sequence numbers can the sender transmit next?
    explain: |
      The window base moves to 7 (next unacknowledged). The window covers 7, 8, 9, 10, 11.
      Packets 7, 8, 9 are already sent (but unacknowledged). The sender can send 10 and 11.
    choices:
      - "Only 10"
      - "10 and 11"
      - "7, 8, 9, 10, 11"
      - "10, 11, 12"
      - "None, must wait for more ACKs"
    answer: 1

  - question: |
      A sliding window protocol uses 4-bit sequence numbers. What is the maximum number of distinct sequence numbers?
    explain: |
      With n bits, there are 2^n distinct sequence numbers. 2^4 = 16.
    choices:
      - "4"
      - "8"
      - "15"
      - "16"
      - "32"
    answer: 3

  - question: |
      For Go-Back-N with 4-bit sequence numbers (16 distinct values), what is the maximum SWS?
    explain: |
      For GBN (RWS = 1): SWS + RWS ≤ 2^n, so SWS ≤ 2^n − 1 = 16 − 1 = 15.
    choices:
      - "4"
      - "8"
      - "15"
      - "16"
      - "32"
    answer: 2

  - question: |
      For Selective Repeat with 4-bit sequence numbers (16 distinct values) and SWS = RWS, what is the maximum SWS?
    explain: |
      For SR: SWS + RWS ≤ 2^n. With SWS = RWS: 2 × SWS ≤ 16, so SWS ≤ 8.
    choices:
      - "4"
      - "7"
      - "8"
      - "15"
      - "16"
    answer: 2

  - question: |
      Why does a sliding window protocol need sequence numbers?
    explain: |
      Sequence numbers allow the receiver to identify packets, detect duplicates, reorder out-of-order arrivals, and determine which packets have been lost. Without them, the receiver cannot distinguish between different packets or retransmissions.
    choices:
      - "To encrypt the data."
      - "To determine the packet size."
      - "To identify, reorder, and detect duplicate packets."
      - "To measure the propagation delay."
      - "To compress the data before sending."
    answer: 2

  - question: |
      In a stop-and-wait protocol, what is the SWS?
    explain: |
      Stop-and-wait is a special case of a sliding window protocol where the sender sends one packet and waits for its acknowledgment before sending the next. SWS = 1.
    choices:
      - "0"
      - "1"
      - "2"
      - "It depends on the RTT."
      - "It depends on the bandwidth."
    answer: 1

  - question: |
      A cumulative ACK with value N means:
    explain: |
      A cumulative acknowledgment with value N tells the sender that all packets up to and including N−1 have been successfully received, and the receiver expects packet N next.
    choices:
      - "Only packet N has been received."
      - "Packets 0 through N have been received."
      - "All packets up to and including N−1 have been received; expecting packet N."
      - "The receiver is requesting retransmission of packet N."
      - "N packets have been lost."
    answer: 2

  - question: |
      What triggers a retransmission in a reliable sliding window protocol?
    explain: |
      A retransmission is typically triggered by a timeout (timer expires without receiving an ACK) or by receiving duplicate ACKs (indicating a likely lost packet). Both mechanisms are used in practice.
    choices:
      - "Only timeouts."
      - "Only duplicate ACKs."
      - "Timeouts or duplicate ACKs."
      - "The receiver explicitly sends a NAK (negative acknowledgment) only."
      - "The sender periodically retransmits all packets."
    answer: 2

  - question: |
      A link has bandwidth 10 Mbps, one-way propagation delay 1 ms, and packet size 10,000 bits. Using a sliding window protocol with SWS = 3, what is the link utilisation?
    explain: |
      Transmission time = 10,000 / 10,000,000 = 1 ms.
      RTT = 2 × 1 = 2 ms.
      Time to fully utilise = RTT + t_trans = 2 + 1 = 3 ms → need 3 packets.
      With SWS = 3, we can send 3 packets in 3 ms, and the first ACK arrives just as we finish sending the third. Utilisation = (3 × 1) / (2 + 1) = 3/3 = 100%.
    choices:
      - "33%"
      - "50%"
      - "75%"
      - "100%"
      - "150%"
    answer: 3

  - question: |
      Same link as above (bandwidth 10 Mbps, propagation delay 1 ms, packet size 10,000 bits). With SWS = 2, what is the link utilisation?
    explain: |
      Transmission time = 1 ms. RTT = 2 ms.
      With SWS = 2: sender transmits 2 packets (takes 2 ms), then must wait.
      Cycle time = RTT + t_trans = 3 ms. Useful time = 2 × 1 = 2 ms.
      Utilisation = 2/3 ≈ 66.7%.
    choices:
      - "33.3%"
      - "50%"
      - "66.7%"
      - "100%"
      - "200%"
    answer: 2

  - question: |
      If the bandwidth-delay product of a link is 50,000 bits and the packet size is 1000 bits, what is the minimum SWS for full utilisation (assuming RTT-based calculation)?
    explain: |
      BDP = bandwidth × RTT = 50,000 bits.
      Number of packets for BDP = 50,000 / 1000 = 50.
      Must also account for the extra transmission time: SWS = BDP/packet_size + 1 = 50 + 1 = 51.
    choices:
      - "25"
      - "50"
      - "51"
      - "52"
      - "100"
    answer: 2

  - question: |
      A sender uses a sliding window with SWS = 8. After a timeout, the sender in Go-Back-N must retransmit how many packets (assuming all 8 were sent and only the first was lost)?
    explain: |
      In Go-Back-N, upon a timeout for a packet, the sender retransmits that packet and all subsequent packets in the window. If 8 packets were sent and the first was lost, all 8 must be retransmitted.
    choices:
      - "1"
      - "2"
      - "4"
      - "7"
      - "8"
    answer: 4

  - question: |
      A source emits two symbols with equal probability (50% each). What is the Shannon entropy?
    explain: |
      H = −(0.5 × log₂(0.5) + 0.5 × log₂(0.5)) = −(0.5 × (−1) + 0.5 × (−1)) = 1 bit.
    choices:
      - "0 bits"
      - "0.5 bits"
      - "1 bit"
      - "2 bits"
      - "log₂(0.5) bits"
    answer: 2

  - question: |
      A source emits four symbols with equal probability (25% each). What is the Shannon entropy?
    explain: |
      H = −4 × (0.25 × log₂(0.25)) = −4 × (0.25 × (−2)) = 2 bits.
    choices:
      - "0.5 bits"
      - "1 bit"
      - "2 bits"
      - "4 bits"
      - "8 bits"
    answer: 2

  - question: |
      A source emits three symbols: A with probability 0.5, B with probability 0.25, and C with probability 0.25. What is the Shannon entropy?
    explain: |
      H = −(0.5 × log₂(0.5) + 0.25 × log₂(0.25) + 0.25 × log₂(0.25))
      = −(0.5 × (−1) + 0.25 × (−2) + 0.25 × (−2))
      = 0.5 + 0.5 + 0.5 = 1.5 bits.
    choices:
      - "1.0 bits"
      - "1.5 bits"
      - "2.0 bits"
      - "2.5 bits"
      - "3.0 bits"
    answer: 1

  - question: |
      A source emits two symbols: A with probability 0.99 and B with probability 0.01. The Shannon entropy is closest to:
    explain: |
      H = −(0.99 × log₂(0.99) + 0.01 × log₂(0.01))
      = −(0.99 × (−0.0145) + 0.01 × (−6.6439))
      = 0.01436 + 0.06644 = 0.0808 bits.
    choices:
      - "0.01 bits"
      - "0.08 bits"
      - "0.5 bits"
      - "0.99 bits"
      - "1.0 bits"
    answer: 1

  - question: |
      Which probability distribution over N symbols gives the maximum Shannon entropy?
    explain: |
      The uniform distribution (each symbol has probability 1/N) maximises Shannon entropy. Any deviation from uniformity reduces uncertainty and thus entropy. Maximum entropy = log₂(N).
    choices:
      - "All probability on one symbol."
      - "Probability decreasing geometrically."
      - "Uniform distribution (equal probabilities)."
      - "Only two symbols with non-zero probability."
      - "A Gaussian distribution over the symbols."
    answer: 2

  - question: |
      The entropy of a source that always emits the same symbol is:
    explain: |
      If one symbol has probability 1, H = −(1 × log₂(1)) = −(1 × 0) = 0 bits. There is no uncertainty.
    choices:
      - "0 bits"
      - "1 bit"
      - "Infinity"
      - "Undefined"
      - "Depends on the alphabet size"
    answer: 0

  - question: |
      A fair coin is flipped. The Shannon entropy is 1 bit. If we flip the coin twice (independently), the total entropy of the two flips together is:
    explain: |
      For independent events, entropy is additive. H(two flips) = H(flip 1) + H(flip 2) = 1 + 1 = 2 bits.
    choices:
      - "0.5 bits"
      - "1 bit"
      - "2 bits"
      - "4 bits"
      - "It depends on the outcomes."
    answer: 2

  - question: |
      A source has entropy 3 bits per symbol. What is the minimum average number of bits per symbol needed to encode the source losslessly?
    explain: |
      Shannon's source coding theorem states that the entropy is the theoretical lower bound on the average number of bits per symbol for lossless compression. So the minimum is 3 bits per symbol.
    choices:
      - "1 bit"
      - "2 bits"
      - "3 bits"
      - "4 bits"
      - "8 bits"
    answer: 2

  - question: |
      Shannon's source coding theorem states that:
    explain: |
      Shannon's source coding theorem establishes that the entropy H of a source is the fundamental lower bound on the average number of bits per symbol for any lossless encoding. It is achievable in the limit with sufficiently long block codes.
    choices:
      - "Data can always be compressed to exactly 1 bit per symbol."
      - "The entropy is an upper bound on compression."
      - "No lossless encoding can use fewer than H bits per symbol on average."
      - "Lossy compression can achieve any desired bit rate."
      - "Entropy only applies to binary sources."
    answer: 2

  - question: |
      What happens to the entropy of a source if we learn that consecutive symbols are correlated (not independent)?
    explain: |
      Correlation between symbols means that knowing one symbol provides information about the next, reducing uncertainty. The entropy per symbol (conditional entropy) decreases compared to the i.i.d. (independent and identically distributed) case.
    choices:
      - "Entropy always increases."
      - "Entropy stays the same."
      - "Entropy per symbol decreases or stays the same."
      - "Entropy becomes negative."
      - "Entropy becomes undefined."
    answer: 2

  - question: |
      A code assigns codewords to symbols. Code X uses: A→0, B→10, C→110, D→111. Is this a prefix code?
    explain: |
      A prefix code (or prefix-free code) has the property that no codeword is a prefix of any other codeword. Checking: "0" is not a prefix of "10", "110", or "111". "10" is not a prefix of "110" or "111". "110" is not a prefix of "111". So yes, it is a prefix code.
    choices:
      - "Yes"
      - "No, because 0 is a prefix of 10."
      - "No, because 110 is a prefix of 111."
      - "No, because the codeword lengths are unequal."
      - "Cannot determine without knowing probabilities."
    answer: 0

  - question: |
      Why is a prefix code desirable?
    explain: |
      A prefix code is instantaneously decodable: the decoder can identify each codeword as soon as its last bit is received, without needing to look ahead at future bits. This simplifies decoding and ensures unique decodability.
    choices:
      - "It always achieves optimal compression."
      - "It allows instantaneous (immediate) decoding."
      - "It requires fewer bits than non-prefix codes."
      - "It can correct transmission errors."
      - "It eliminates the need for sequence numbers."
    answer: 1

  - question: |
      Given symbols with probabilities: A=0.4, B=0.3, C=0.2, D=0.1. A Huffman code assigns: A→0, B→10, C→110, D→111. What is the average code length?
    explain: |
      Average = 0.4×1 + 0.3×2 + 0.2×3 + 0.1×3 = 0.4 + 0.6 + 0.6 + 0.3 = 1.9 bits.
    choices:
      - "1.5 bits"
      - "1.8 bits"
      - "1.9 bits"
      - "2.0 bits"
      - "2.25 bits"
    answer: 2

  - question: |
      For the same source (A=0.4, B=0.3, C=0.2, D=0.1), what is the Shannon entropy?
    explain: |
      H = −(0.4×log₂0.4 + 0.3×log₂0.3 + 0.2×log₂0.2 + 0.1×log₂0.1)
      = −(0.4×(−1.322) + 0.3×(−1.737) + 0.2×(−2.322) + 0.1×(−3.322))
      = 0.5288 + 0.5211 + 0.4644 + 0.3322 = 1.8464 bits.
    choices:
      - "1.5 bits"
      - "1.85 bits"
      - "2.0 bits"
      - "2.32 bits"
      - "3.32 bits"
    answer: 1

  - question: |
      The Kraft inequality states that for a prefix code with codeword lengths l₁, l₂, ..., lₙ:
    explain: |
      The Kraft inequality is: Σ 2^(−lᵢ) ≤ 1. This is a necessary and sufficient condition for the existence of a prefix code with the given codeword lengths.
    choices:
      - "Σ lᵢ ≤ n"
      - "Σ 2^(lᵢ) ≤ 1"
      - "Σ 2^(−lᵢ) ≤ 1"
      - "max(lᵢ) ≤ n"
      - "Σ lᵢ × pᵢ ≤ H"
    answer: 2

  - question: |
      A binary symmetric channel (BSC) has an error probability p = 0. What is its capacity?
    explain: |
      C = 1 − H(0) = 1 − 0 = 1 bit per channel use. A perfect channel can transmit 1 bit of information per use.
    choices:
      - "0 bits per use"
      - "0.5 bits per use"
      - "1 bit per use"
      - "2 bits per use"
      - "Infinity"
    answer: 2

  - question: |
      A BSC has error probability p = 0.5. What is its capacity?
    explain: |
      C = 1 − H(0.5) = 1 − 1 = 0 bits per channel use. A BSC with p = 0.5 is completely useless; the output is independent of the input.
    choices:
      - "0 bits per use"
      - "0.5 bits per use"
      - "1 bit per use"
      - "−1 bit per use"
      - "Undefined"
    answer: 0

  - question: |
      A BSC has error probability p = 0.1 and a raw speed of 1000 bits/s. What is the Shannon capacity?
    explain: |
      H(0.1) = −0.1×log₂(0.1) − 0.9×log₂(0.9) = 0.3322 + 0.1368 = 0.4690.
      C = 1 − 0.4690 = 0.5310 bits per use.
      Capacity = 1000 × 0.5310 = 531 bits/s.
    choices:
      - "100 bits/s"
      - "469 bits/s"
      - "531 bits/s"
      - "900 bits/s"
      - "1000 bits/s"
    answer: 2

  - question: |
      Shannon's channel coding theorem guarantees that:
    explain: |
      Shannon's noisy channel coding theorem states that for any rate R below the channel capacity C, there exists an error correcting code that achieves an arbitrarily low error probability. However, it does not guarantee zero errors, only that the error probability can be made as small as desired.
    choices:
      - "Errors can be eliminated completely at any rate."
      - "For rates below capacity, arbitrarily low error probability is achievable."
      - "For rates above capacity, error-free communication is still possible with enough power."
      - "The channel capacity depends on the encoding scheme used."
      - "Only Turbo codes can approach the Shannon limit."
    answer: 1

  - question: |
      If we want to send data at a rate above the channel capacity, what does Shannon's theorem tell us?
    explain: |
      Shannon's theorem states that reliable communication is impossible at rates above the channel capacity. No matter what error correcting code is used, the error probability cannot be made arbitrarily small.
    choices:
      - "It can be done with a sufficiently powerful error correcting code."
      - "It can be done by increasing the transmission power."
      - "Reliable communication at that rate is not possible."
      - "It requires using analog instead of digital transmission."
      - "It can be done by using multiple channels."
    answer: 2

  - question: |
      An error correcting code adds redundancy to data. This redundancy:
    explain: |
      Redundancy allows the receiver to detect and/or correct errors introduced by the channel. However, it reduces the effective data rate because some of the transmitted bits carry redundancy rather than new information.
    choices:
      - "Increases the data rate."
      - "Decreases the data rate but enables error detection/correction."
      - "Has no effect on the data rate."
      - "Eliminates all channel noise."
      - "Only helps with burst errors, not random errors."
    answer: 1

  - question: |
      A source produces errors in its data before transmission. Can a channel error correcting code fix these source errors?
    explain: |
      A channel error correcting code is designed to correct errors introduced by the communication channel during transmission. It encodes the source data as-is (including any pre-existing errors) and protects it from channel corruption. It cannot distinguish or correct errors already present in the source.
    choices:
      - "Yes, always."
      - "Yes, but only with advanced codes like LDPC."
      - "No, channel codes only correct channel-induced errors."
      - "Yes, but only if the source error rate is below 50%."
      - "Yes, by using interleaving."
    answer: 2

  - question: |
      A Hamming code can correct:
    explain: |
      A single-error-correcting Hamming code can correct exactly one bit error per codeword. It can also detect (but not correct) two-bit errors.
    choices:
      - "Any number of errors."
      - "Up to 2 errors per codeword."
      - "Exactly 1 error per codeword."
      - "Only burst errors."
      - "Errors only if the error rate is below 1%."
    answer: 2

  - question: |
      What is the code rate of a code that encodes 4 data bits into 7-bit codewords?
    explain: |
      Code rate = k/n = data bits / total bits = 4/7 ≈ 0.571.
    choices:
      - "3/7"
      - "4/7"
      - "4/3"
      - "7/4"
      - "3/4"
    answer: 1

  - question: |
      If a BSC has capacity 0.8 bits per channel use and raw speed 1000 bits/s, and we want to transmit at 600 useful bits/s, which statement is true?
    explain: |
      Channel capacity = 0.8 × 1000 = 800 useful bits/s. Since 600 < 800, this rate is below capacity. Shannon's theorem guarantees that a suitable error correcting code exists to achieve arbitrarily low error probability at this rate.
    choices:
      - "This is impossible regardless of the code used."
      - "This is achievable with a suitably chosen error correcting code."
      - "This is achievable without any error correcting code."
      - "This requires the BSC error probability to be exactly 0."
      - "This requires a code rate greater than 1."
    answer: 1

  - question: |
      A fixed-length code for 8 symbols requires how many bits per symbol?
    explain: |
      For 8 symbols: ⌈log₂(8)⌉ = 3 bits per symbol.
    choices:
      - "2 bits"
      - "3 bits"
      - "4 bits"
      - "8 bits"
      - "16 bits"
    answer: 1

  - question: |
      A code is uniquely decodable if:
    explain: |
      A code is uniquely decodable if every finite string of codewords can be decoded in only one way. This means there is no ambiguity when parsing a concatenated sequence of codewords.
    choices:
      - "All codewords have the same length."
      - "Every concatenation of codewords can be decoded in exactly one way."
      - "It uses the minimum possible number of bits."
      - "It is a prefix code."
      - "The codewords are sorted by probability."
    answer: 1

  - question: |
      Every prefix code is uniquely decodable. Is every uniquely decodable code a prefix code?
    explain: |
      No. There exist uniquely decodable codes that are not prefix codes. For example, the code {0, 01} is uniquely decodable (by decoding from right to left) but not prefix-free since "0" is a prefix of "01". However, every uniquely decodable code can be replaced by a prefix code with the same codeword lengths (by the Kraft inequality).
    choices:
      - "Yes, they are equivalent."
      - "No, some uniquely decodable codes are not prefix codes."
      - "Yes, by definition."
      - "No, and uniquely decodable codes are always shorter."
      - "Only for binary codes."
    answer: 1

  - question: |
      Consider a code: A→00, B→01, C→10, D→11. What type of code is this?
    explain: |
      All codewords have the same length (2 bits). This is a fixed-length code. It is also trivially a prefix code since no codeword of equal length can be a prefix of another.
    choices:
      - "Variable-length prefix code"
      - "Fixed-length code"
      - "Non-uniquely decodable code"
      - "Huffman code"
      - "Run-length code"
    answer: 1

  - question: |
      Huffman coding produces:
    explain: |
      Huffman coding produces an optimal prefix code — one that minimises the average codeword length among all prefix codes for a given probability distribution.
    choices:
      - "A code that always uses exactly H bits per symbol."
      - "An optimal prefix code with minimum average codeword length."
      - "A fixed-length code."
      - "A code that requires no knowledge of symbol probabilities."
      - "A code that can correct errors."
    answer: 1

  - question: |
      For a source with two symbols (probabilities 0.9 and 0.1), the Huffman code assigns 1 bit to each symbol. The entropy is approximately 0.469 bits. This shows that:
    explain: |
      Huffman coding assigns integer-length codewords. With only 2 symbols, both must get 1-bit codewords (0 and 1), giving an average of 1 bit. The entropy is 0.469 bits, so there is a gap of about 0.531 bits. This gap exists because Huffman coding cannot assign fractional bit lengths. Arithmetic coding or coding blocks of symbols can close this gap.
    choices:
      - "Huffman coding is always optimal."
      - "Huffman coding can have a gap between average length and entropy for small alphabets."
      - "The entropy calculation must be wrong."
      - "Huffman coding wastes no bits."
      - "Two symbols always require 2 bits."
    answer: 1

  - question: |
      Which compression technique can achieve an average code length closer to the entropy than symbol-by-symbol Huffman coding?
    explain: |
      Arithmetic coding can encode messages with an average length very close to the entropy, even when symbol probabilities lead to non-integer ideal code lengths. It effectively encodes the entire message as a single fractional number.
    choices:
      - "Run-length encoding"
      - "Fixed-length coding"
      - "Arithmetic coding"
      - "Parity check codes"
      - "Manchester encoding"
    answer: 2

  - question: |
      A code has codewords: A→0, B→10, C→101. Is this a prefix code?
    explain: |
      Check: is any codeword a prefix of another? "10" (B) is a prefix of "101" (C). Therefore this is NOT a prefix code.
    choices:
      - "Yes"
      - "No, because '10' is a prefix of '101'."
      - "No, because '0' is a prefix of '10'."
      - "No, because the codewords have different lengths."
      - "Cannot determine."
    answer: 1

  - question: |
      The average codeword length of any uniquely decodable code is always:
    explain: |
      By Shannon's source coding theorem, the average codeword length L of any uniquely decodable code satisfies L ≥ H, where H is the Shannon entropy. Equality is achieved only when all probabilities are negative powers of 2.
    choices:
      - "Equal to the entropy."
      - "Less than the entropy."
      - "Greater than or equal to the entropy."
      - "Exactly 1 bit more than the entropy."
      - "Unrelated to the entropy."
    answer: 2

  - question: |
      A source has 5 symbols with probabilities 1/2, 1/4, 1/8, 1/16, 1/16. The Shannon entropy is:
    explain: |
      H = −(1/2 × log₂(1/2) + 1/4 × log₂(1/4) + 1/8 × log₂(1/8) + 1/16 × log₂(1/16) + 1/16 × log₂(1/16))
      = 1/2×1 + 1/4×2 + 1/8×3 + 1/16×4 + 1/16×4
      = 0.5 + 0.5 + 0.375 + 0.25 + 0.25 = 1.875 bits.
    choices:
      - "1.5 bits"
      - "1.75 bits"
      - "1.875 bits"
      - "2.0 bits"
      - "2.322 bits"
    answer: 2

  - question: |
      In HTTP 1.0 (without persistent connections), how many TCP connections are needed to download an HTML page and 5 embedded images?
    explain: |
      HTTP 1.0 without persistent connections opens a new TCP connection for each object. 1 HTML page + 5 images = 6 TCP connections.
    choices:
      - "1"
      - "2"
      - "5"
      - "6"
      - "10"
    answer: 3

  - question: |
      In HTTP 1.1 with persistent connections (without pipelining), how many TCP connections are needed to download an HTML page and 5 embedded images from the same server?
    explain: |
      HTTP 1.1 with persistent connections reuses the same TCP connection for multiple requests. All 6 objects (1 HTML + 5 images) are fetched over a single TCP connection.
    choices:
      - "1"
      - "2"
      - "5"
      - "6"
      - "10"
    answer: 0

  - question: |
      What is the key difference between HTTP 1.1 persistent connections with and without pipelining?
    explain: |
      Without pipelining, the client waits for each response before sending the next request (request-response-request-response...). With pipelining, the client sends multiple requests back-to-back without waiting for responses, reducing idle time on the connection.
    choices:
      - "Pipelining uses more TCP connections."
      - "Pipelining sends multiple requests without waiting for each response."
      - "Pipelining compresses the data."
      - "Pipelining encrypts the connection."
      - "Pipelining changes the order of requests."
    answer: 1

  - question: |
      A client downloads a 2000-byte HTML file and then 3 images of 5000 bytes each from the same server. Link speed is 1000 kbit/s, RTT is 10 ms. Using HTTP 1.1 persistent with pipelining, how long does the full transfer take?
    explain: |
      Transmission times: HTML = 2000×8/1,000,000 = 16 ms. Each image = 5000×8/1,000,000 = 40 ms.
      Total image data transmission = 3 × 40 = 120 ms.

      HTTP 1.1 persistent + pipelining:
      1. TCP handshake: 1 RTT = 10 ms
      2. Request HTML + response: 1 RTT + 16 ms = 10 + 16 = 26 ms
      3. Request 3 images (pipelined) + response: 1 RTT + 120 ms = 10 + 120 = 130 ms
      Total = 10 + 26 + 130 = 166 ms.
    choices:
      - "136 ms"
      - "146 ms"
      - "156 ms"
      - "166 ms"
      - "196 ms"
    answer: 3

  - question: |
      In the previous scenario, how long would it take using HTTP 1.0 (non-persistent)?
    explain: |
      HTTP 1.0: each object needs a new connection.
      - HTML: 1 RTT (handshake) + 1 RTT (request) + 16 ms = 10+10+16 = 36 ms
      - Image 1: 10+10+40 = 60 ms
      - Image 2: 10+10+40 = 60 ms
      - Image 3: 10+10+40 = 60 ms
      Total = 36 + 60 + 60 + 60 = 216 ms.
    choices:
      - "166 ms"
      - "186 ms"
      - "196 ms"
      - "216 ms"
      - "256 ms"
    answer: 3

  - question: |
      HTTP is a stateless protocol. What does this mean?
    explain: |
      A stateless protocol means the server does not retain any information about previous requests from the same client. Each request is treated independently. State can be maintained using mechanisms like cookies, but the protocol itself is stateless.
    choices:
      - "The server cannot handle multiple clients."
      - "The server does not remember previous requests from the same client."
      - "The connection is always encrypted."
      - "Each request must use a new IP address."
      - "No data is transmitted."
    answer: 1

  - question: |
      What is the purpose of the TCP three-way handshake?
    explain: |
      The three-way handshake (SYN, SYN-ACK, ACK) establishes a TCP connection. It synchronises sequence numbers between client and server and confirms that both sides are ready to communicate.
    choices:
      - "To encrypt the connection."
      - "To establish a connection and synchronise sequence numbers."
      - "To negotiate the HTTP version."
      - "To authenticate the client."
      - "To compress the data."
    answer: 1

  - question: |
      How many RTTs does the TCP three-way handshake require before data can be sent?
    explain: |
      The handshake is: Client sends SYN → Server sends SYN-ACK → Client sends ACK (and can include data).
      This takes 1 RTT (SYN to SYN-ACK) plus the ACK which can carry the first request. So typically 1 RTT for the handshake, and then 1 more RTT for the first request-response.
    choices:
      - "0 RTTs"
      - "1 RTT"
      - "2 RTTs"
      - "3 RTTs"
      - "4 RTTs"
    answer: 1

  - question: |
      HTTP 1.1 persistent connections with pipelining save RTTs compared to HTTP 1.0 by:
    explain: |
      Two sources of savings: (1) Eliminating extra TCP handshakes for each object (persistent connections), and (2) Sending multiple requests without waiting for individual responses (pipelining), which avoids one RTT per additional request.
    choices:
      - "Compressing data more efficiently."
      - "Reusing TCP connections and sending multiple requests without waiting for individual responses."
      - "Using UDP instead of TCP."
      - "Increasing the link bandwidth."
      - "Caching all objects locally."
    answer: 1

  - question: |
      In HTTP 1.1 without pipelining (persistent connection), downloading an HTML page and then N embedded objects requires how many RTTs (excluding data transmission time)?
    explain: |
      TCP handshake: 1 RTT. HTML request: 1 RTT. Then N sequential requests (one RTT each since no pipelining): N RTTs.
      Total RTTs = 1 + 1 + N = N + 2.
    choices:
      - "N"
      - "N + 1"
      - "N + 2"
      - "2N"
      - "2N + 2"
    answer: 2

  - question: |
      In HTTP 1.1 with pipelining (persistent connection), downloading an HTML page and then N embedded objects requires how many RTTs (excluding data transmission time)?
    explain: |
      TCP handshake: 1 RTT. HTML request: 1 RTT. All N objects requested in pipeline (1 RTT for the batch): 1 RTT.
      Total RTTs = 1 + 1 + 1 = 3.
    choices:
      - "N + 2"
      - "N + 1"
      - "3"
      - "2"
      - "1"
    answer: 2

  - question: |
      HTTP/2 improves over HTTP 1.1 primarily by:
    explain: |
      HTTP/2 introduces multiplexing, allowing multiple requests and responses to be interleaved over a single TCP connection simultaneously. It also supports header compression (HPACK) and server push. This solves the head-of-line blocking problem present in HTTP 1.1 pipelining.
    choices:
      - "Using UDP instead of TCP."
      - "Multiplexing multiple streams over a single connection."
      - "Eliminating the need for TCP handshakes."
      - "Removing all headers from requests."
      - "Using a different port number."
    answer: 1

  - question: |
      What HTTP status code indicates "Not Found"?
    explain: |
      HTTP 404 is the standard response code indicating that the server could not find the requested resource.
    choices:
      - "200"
      - "301"
      - "403"
      - "404"
      - "500"
    answer: 3

  - question: |
      What HTTP status code indicates a successful response?
    explain: |
      HTTP 200 OK indicates that the request was successful and the server is returning the requested resource.
    choices:
      - "100"
      - "200"
      - "301"
      - "404"
      - "500"
    answer: 1

  - question: |
      A web page references 10 small images (100 bytes each) on the same server. The RTT is 100 ms and the link speed is 1 Mbps. What dominates the download time?
    explain: |
      Transmission time per image = 800 bits / 1,000,000 bps = 0.8 ms. Total transmission = 8 ms.
      With HTTP 1.0: 10 connections × 2 RTTs each = 2000 ms of RTT overhead.
      Even with pipelining: 3 RTTs × 100 ms = 300 ms of RTT overhead.
      In all cases, the RTT overhead far exceeds the tiny transmission times. The latency (RTT) dominates.
    choices:
      - "The transmission time of the images."
      - "The processing time at the server."
      - "The round-trip time (latency)."
      - "The size of the HTML file."
      - "The bandwidth of the link."
    answer: 2

  - question: |
      In a client-server model, if N clients each need to download a file of size F from a server with upload speed u_s, the minimum distribution time grows at least as:
    explain: |
      The server must upload N copies of the file. Minimum time ≥ N × F / u_s. This grows linearly with N.
    choices:
      - "O(1)"
      - "O(log N)"
      - "O(N)"
      - "O(N²)"
      - "O(N × log N)"
    answer: 2

  - question: |
      In a peer-to-peer (P2P) distribution model, the minimum distribution time for N peers grows:
    explain: |
      In P2P, peers help each other by uploading pieces they have received. The total upload capacity grows with N (each peer contributes its upload bandwidth). The minimum distribution time is bounded by max(F/u_s, F/d_min, N×F/(u_s + Σu_i)), which grows sublinearly and can even approach a constant as N grows large.
    choices:
      - "Linearly with N."
      - "Quadratically with N."
      - "Sublinearly (much slower than linearly) with N."
      - "Exponentially with N."
      - "It is independent of N."
    answer: 2

  - question: |
      In P2P file distribution, the minimum distribution time is the maximum of three terms. Which of the following is NOT one of those terms?
    explain: |
      The three terms are: (1) F/u_s (server upload bottleneck), (2) F/d_min (slowest peer download), (3) N×F/(u_s + Σu_i) (total upload capacity). The RTT between peers is not directly one of these terms in the simplified model.
    choices:
      - "F / u_s (file size divided by server upload speed)"
      - "F / d_min (file size divided by minimum peer download speed)"
      - "N × F / (u_s + Σu_i) (aggregate upload capacity constraint)"
      - "RTT between the server and the peers"
      - "All of the above are part of the formula"
    answer: 3

  - question: |
      A file of 100 Mbits is distributed via P2P. The server has 10 Mbps upload. There are 5 peers, each with 2 Mbps upload and 5 Mbps download. What is the minimum distribution time?
    explain: |
      Term 1: F/u_s = 100/10 = 10 s.
      Term 2: F/d_min = 100/5 = 20 s.
      Term 3: N×F/(u_s + N×u_i) = 5×100/(10+5×2) = 500/20 = 25 s.
      Minimum time = max(10, 20, 25) = 25 s.
    choices:
      - "10 s"
      - "20 s"
      - "25 s"
      - "50 s"
      - "100 s"
    answer: 2

  - question: |
      What is the main advantage of P2P over client-server for file distribution?
    explain: |
      In P2P, each peer that downloads the file also uploads parts to other peers, so the total available upload bandwidth increases with the number of peers. This makes P2P highly scalable, unlike client-server where the server is the bottleneck.
    choices:
      - "Lower latency for each individual peer."
      - "The server does not need any upload bandwidth."
      - "Scalability: aggregate upload capacity grows with the number of peers."
      - "Files are always encrypted in P2P."
      - "P2P eliminates the need for TCP."
    answer: 2

  - question: |
      In BitTorrent, what mechanism incentivises peers to upload to each other?
    explain: |
      BitTorrent uses a "tit-for-tat" strategy: a peer preferentially uploads to peers that are uploading to it at the highest rates. Peers that don't upload (free-riders) are "choked" (not served). This incentivises cooperation.
    choices:
      - "A central server forces all peers to upload."
      - "Peers are fined for not uploading."
      - "A tit-for-tat mechanism: peers preferentially serve those who upload to them."
      - "All peers must upload at the same rate."
      - "Peers that don't upload are permanently banned."
    answer: 2

  - question: |
      A BitTorrent tracker's primary role is to:
    explain: |
      The tracker maintains a list of peers participating in the torrent and provides this list to new peers joining the swarm. It does not transfer file data itself.
    choices:
      - "Store and serve the file data."
      - "Encrypt the file for distribution."
      - "Keep track of which peers are participating and help peers find each other."
      - "Verify the integrity of downloaded data."
      - "Assign IP addresses to peers."
    answer: 2

  - question: |
      Which protocol is used by a mail client to SEND email to a mail server?
    explain: |
      SMTP (Simple Mail Transfer Protocol) is used for sending email from a client to a server and between servers. IMAP and POP3 are used for retrieving email.
    choices:
      - "HTTP"
      - "IMAP"
      - "POP3"
      - "SMTP"
      - "FTP"
    answer: 3

  - question: |
      Which protocol(s) can be used by a mail client to RETRIEVE email from a mail server?
    explain: |
      IMAP (Internet Message Access Protocol) and POP3 (Post Office Protocol version 3) are both used for retrieving email from a server. SMTP is only for sending.
    choices:
      - "SMTP only"
      - "IMAP only"
      - "POP3 only"
      - "IMAP or POP3"
      - "HTTP only"
    answer: 3

  - question: |
      What is the main difference between IMAP and POP3?
    explain: |
      IMAP keeps messages on the server and supports folder management, synchronisation across multiple devices, and selective downloading. POP3 typically downloads messages to the local client and deletes them from the server (though it can be configured not to).
    choices:
      - "IMAP is faster than POP3."
      - "IMAP keeps messages on the server; POP3 typically downloads and removes them."
      - "POP3 is more secure than IMAP."
      - "IMAP can only handle text; POP3 can handle attachments."
      - "There is no difference."
    answer: 1
